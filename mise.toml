[tools]
python = "3.12"
uv = "latest"

[tasks.setup]
description = "Install project deps and the Prime Intellect CLI"
run = [
  "uv sync",
  "uv tool install prime --force",
]

[tasks.doctor]
description = "Verify the toolchain is ready"
run = [
  "uv --version",
  "uv run prime --version",
]

[tasks.login]
description = "Authenticate the Prime CLI (interactive — opens browser)"
run = "uv run prime login"

[tasks.test]
description = "Run the test suite"
run = "uv run pytest -q"

[tasks.probe]
description = "Probe a model on an env. Args after --, e.g. `mise run probe -- env=code_smoke model=ollama`"
run = "uv run python -m laguna_rlvr.probe"

[tasks.report]
description = "Rank probe results by learnable signal -> results/probe/ranking.{md,png}"
run = "uv run python -m laguna_rlvr.report"

[tasks.verify-seed]
description = "Check every Adaption seed row is verifiable (ref passes all tests, empty stub fails)"
run = "uv run python scripts/verify_seed.py docs/adaption/seed_multilingual_coding.jsonl"

[tasks.synthesize]
description = "Synthesize a verifiable general-agent corpus (LLM -> self-consistent tasks). Args: domains."
run = "uv run python -m laguna_rlvr.synth"

[tasks.rlvr-loop]
description = "One self-evolving RLVR turn: synthesize -> probe base rate -> rank learnable -> gate/train. Args: domains."
run = "bash scripts/rlvr_loop.sh"

[tasks.train]
description = "Launch the free hosted Laguna RL run from the toml config (code_smoke)"
run = "uv run prime train configs/rl/laguna-xs2.toml"

[tasks.submit-curriculum]
description = "Push read+frontend envs + submit the hosted GSPO curriculum (free Laguna slot)"
run = "uv run bash scripts/submit_training.sh configs/rl/laguna-curriculum.toml environments/ocr_tool environments/frontend_design"

[tasks.eval-baseline]
description = "Baseline eval: base Laguna on the read + frontend envs (the before-numbers for lift)"
run = [
  "uv run prime eval run chaleong/ocr-tool -m poolside/laguna-xs.2",
  "uv run prime eval run chaleong/frontend-design -m poolside/laguna-xs.2",
]

[tasks.monitor]
description = "Monitor a hosted run: metrics + reward/advantage distributions + rollouts. Args after --: <run-id>"
run = 'uv run prime train metrics {{arg(name="run")}} && uv run prime train distributions {{arg(name="run")}} && uv run prime train rollouts {{arg(name="run")}}'

[tasks.mm-adapter-plan]
description = "Dry-run the A100 40GB generalized adapter scaffold"
run = "uv run python scripts/mm_adapter_plan.py configs/mm_adapter/a100-40gb-projector.toml"
