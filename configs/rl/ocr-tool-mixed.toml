# Free hosted RL of Laguna XS.2 on ocr_tool, scaffold="mixed".
# ocr_tool is saturated (4/4) in any SINGLE native syntax — no gradient. But 'mixed' round-robins the
# tool-call syntax, and Laguna fails the Hermes `xml` format 0/4 (it reverts to its poolside_v1 dialect),
# so the batch gets real reward variance: line/json/poolside pass, xml fails -> a learnable format gap.
# This trains tool-call robustness in. See docs/specs/2026-06-02-multi-scaffold-tooluse.md.
#
#   bash scripts/submit_training.sh ocr_tool configs/rl/ocr-tool-mixed.toml
#
# Eval before/after (per scaffold to see the xml gap close):
#   mise run eval -- ocr_tool --env-args '{"scaffold":"xml"}' -n 4
model = "poolside/Laguna-XS.2"

max_steps = 50
batch_size = 64            # rollouts per step (hackathon cap: 128)
rollouts_per_example = 8   # >1 → within-task variance; with mixed, also spans the 4 tool-call syntaxes
learning_rate = 1e-5

[sampling]
max_tokens = 1024
enable_thinking = false

[[env]]
id = "chaleong/ocr-tool"
args = { max_turns = 4, scaffold = "mixed" }
