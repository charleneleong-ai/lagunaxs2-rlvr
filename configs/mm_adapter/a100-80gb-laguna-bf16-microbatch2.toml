# Stage-2 QA-SFT + attention-LoRA on one A100 80GB, micro_batch=2 (batched forward_qa) variant.
# Unquantized BF16 Laguna XS.2 (~67GB) frozen, SigLIP2-NaFlex encoder frozen, train the resampler
# projector + attention LoRA. (NVFP4/FP8/INT4 checkpoints store MoE experts as packed per-expert
# Linears that don't load into this modeling revision's fused params — they init random — so we use
# the BF16 base, which fits 80GB with headroom. The 40GB-NVFP4 scaffold is a100-40gb-projector.toml.)
# The modality/adapter knobs below mirror the launch flags (--encoder/--projector/--objective/--unfreeze
# /--lr) and document the run; train.py reads micro_batch_size, gradient_accumulation_steps, max_steps,
# learning_rate, the backbone, the mixture, and the guardrails.
name = "laguna-xs2-siglip2naflex-qasft-lora-bf16-microbatch2"

[backbone]
model_id = "poolside/Laguna-XS.2"
quantization = "bf16"
params_b = 33.4
freeze = true
max_sequence_length = 8192

[modality]
kind = "screenshot_image"
encoder_id = "google/siglip2-so400m-patch16-naflex"   # --encoder siglip_naflex (native variable-res, no tiling)
encoder_role = "vision_encoder"
fallback_encoder_id = "google/siglip2-base-patch16-naflex"
freeze_encoder = true

[adapter]
kind = "resampler_projector"        # --projector resampler: Perceiver resampler -> 256 vision tokens
objective = "qa_sft"                # --objective qa: masked CE on the needle answer, forces vision use
train_projector = true

[training]
stage = "qa_sft_lora"               # --unfreeze lora: attention-only LoRA (q/k/v/o) on the frozen decoder
micro_batch_size = 2
gradient_accumulation_steps = 4     # micro_batch 2 x accum 4 = effective_batch 8, batched forward fills the GPU
learning_rate = 0.00002             # --lr 2e-5 (the Stage-2 / reference LR)
max_steps = 3000
lora_enabled = true

[gpu_guardrails]
max_vram_gb = 80
reserve_vram_gb = 6

[mixture]
# Weights for `--dataset mix` (override at the CLI with --mixture). A hand-set prior — sweep it
# (scripts/mixture_sweep.py) and pick by held-out val rather than trust these numbers.
# synthetic (SyntheticOCR) is the OCR anchor: a kind=None transcription target that keeps the
# projector's readout from collapsing into the code objective (the lqe323t4 OCR-starvation). Required.
# chartmimic dropped: its HF label is a filename, not the code -> extract_needle finds no title.
weights = { websight = 0.45, webcode2m = 0.25, swebench_mm = 0.1, synthetic = 0.2 }
